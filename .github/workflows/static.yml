name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # This targets your web/ directory and safely leaves 'videos' behind
      - name: Stage Web Files
        run: |
          mkdir -p _site
          # Copy all HTML files from web/ into the root of _site
          cp web/*.html _site/
          # Safely copy the assets folder if it exists inside web/
          if [ -d "web/assets" ]; then cp -r web/assets _site/; fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
