name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # This targets your web/ directory and safely leaves 'videos' behind
      - name: Stage Web Files
        run: |
          mkdir -p _site
          # 1. Copy HTML and assets
          cp web/*.html _site/
          if [ -d "web/assets" ]; then cp -r web/assets _site/; fi
          
          # 2. Build a fresh videos folder using the real files
          mkdir -p _site/videos
          # Find all .mp4 files (ignoring symlinks) and copy them to the live videos folder
          find . -name "*.mp4" -type f -exec cp {} _site/videos/ \;
    
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
